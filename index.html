  <!-- ── 動態產生錢包圖示（純 Canvas，不依賴外部圖片）── -->
  <script>
    (function () {
      function makeIcon(size) {
        const c = document.createElement('canvas');
        c.width = c.height = size;
        const ctx = c.getContext('2d');
        const r = size * 0.22;

        // 圓角背景（紫灰漸層）
        const g = ctx.createLinearGradient(0, 0, size, size);
        g.addColorStop(0, '#c8c2ca');
        g.addColorStop(1, '#8f8a91');
        ctx.beginPath();
        ctx.moveTo(r, 0); ctx.arcTo(size,0,size,size,r);
        ctx.arcTo(size,size,0,size,r); ctx.arcTo(0,size,0,0,r);
        ctx.arcTo(0,0,size,0,r); ctx.closePath();
        ctx.fillStyle = g; ctx.fill();

        // 錢包本體（白色圓角矩形）
        const p=size*0.14, w=size-p*2, h=size*0.48, y0=size*0.30, br=size*0.08;
        ctx.fillStyle='#ffffff';
        ctx.beginPath(); ctx.roundRect(p,y0,w,h,br); ctx.fill();

        // 錢包上蓋
        ctx.fillStyle='#ede9ee';
        ctx.beginPath(); ctx.roundRect(p,y0-size*0.10,w,size*0.16,[br,br,0,0]); ctx.fill();

        // 金幣
        const cx=size*0.62, cy=size*0.555, cr=size*0.10;
        ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2);
        ctx.fillStyle='#f0d080'; ctx.fill();
        ctx.strokeStyle='#d4a800'; ctx.lineWidth=size*0.025; ctx.stroke();

        // $ 符號
        ctx.fillStyle='#8b6800';
        ctx.font=`bold ${size*0.13}px serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('$', cx, cy+size*0.005);

        return c.toDataURL('image/png');
      }

      // Apple touch icons
      [180,152,120,76].forEach(s=>{
        const l=document.createElement('link');
        l.rel='apple-touch-icon'; l.sizes=`${s}x${s}`; l.href=makeIcon(s);
        document.head.appendChild(l);
      });

      // Favicon
      const fav=document.createElement('link');
      fav.rel='icon'; fav.type='image/png'; fav.href=makeIcon(64);
      document.head.appendChild(fav);

      // Web App Manifest
      const manifest={
        name:'Family Wallet', short_name:'家庭錢包',
        description:'家庭記帳與預算管理',
        start_url:'./', display:'standalone',
        background_color:'#e2e8f0', theme_color:'#b1acb3',
        orientation:'portrait',
        icons:[
          {src:makeIcon(192),sizes:'192x192',type:'image/png',purpose:'any maskable'},
          {src:makeIcon(512),sizes:'512x512',type:'image/png',purpose:'any maskable'}
        ]
      };
      const ml=document.createElement('link');
      ml.rel='manifest';
      ml.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));
      document.head.appendChild(ml);
    })();
  </script>

<body>
<div id="root"></div>
<script type="text/babel">

// ─── 【修改 1】：統一模型常數，方便未來更換 ───────────────────
const GEMINI_MODEL = 'gemini-2.5-flash';

// ─── 常數 ────────────────────────────────────────────────────
const EXPENSE_CATS = [
  { id:'food',    label:'餐飲', emoji:'🍜', color:'#7c9cbb' },
  { id:'transit', label:'交通', emoji:'🚇', color:'#a8b8a0' },
  { id:'shop',    label:'購物', emoji:'🛍️', color:'#c4a882' },
  { id:'medical', label:'醫療', emoji:'💊', color:'#b89aaa' },
  { id:'fun',     label:'娛樂', emoji:'🎮', color:'#89adb0' },
  { id:'home',    label:'居家', emoji:'🏠', color:'#c4b598' },
  { id:'drink',   label:'飲品', emoji:'🧋', color:'#a099b8' },
  { id:'other',   label:'其他', emoji:'📦', color:'#8bab9f' },
];
const INCOME_CATS = [
  { id:'salary',    label:'薪資',   emoji:'💼', color:'#10b981' },
  { id:'freelance', label:'兼職',   emoji:'💡', color:'#06b6d4' },
  { id:'invest',    label:'投資',   emoji:'📈', color:'#8b5cf6' },
  { id:'gift',      label:'禮金',   emoji:'🎁', color:'#f59e0b' },
  { id:'other_in',  label:'其他',   emoji:'💰', color:'#64748b' },
];
const CATS = EXPENSE_CATS;
const ALL_CATS = [...EXPENSE_CATS, ...INCOME_CATS];
const CAT_MAP = Object.fromEntries(ALL_CATS.map(c => [c.id, c]));

const DEFAULT_WALLETS = [
  { id:'w1', name:'現金',   icon:'💵', balance:3000  },
  { id:'w2', name:'銀行卡', icon:'🏦', balance:28000 },
];
const DEFAULT_SETTINGS = { geminiKey:'', budget:30000, theme:'light' };

// ─── 共用元件：客製化彈出視窗 ─────────────────────────────────
function CustomModal({ isOpen, title, text, textRed, onOk, onCancel }) {
  if (!isOpen) return null;
  return (
    <div style={{position:'fixed',inset:0,background:'var(--modal-overlay)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',transition:'background-color 0.4s'}} onClick={onCancel}>
      <div className="card fade-in" style={{width:'85%',maxWidth:320,padding:24}} onClick={e=>e.stopPropagation()}>
        <h3 style={{fontSize:18,fontWeight:700,marginBottom:12}}>{title}</h3>
        <div style={{fontSize:14,lineHeight:1.5,marginBottom:24,color:textRed?'var(--danger)':'var(--text-muted)'}}>
          {text}
        </div>
        <div style={{display:'flex',gap:12}}>
          <button className="btn btn-danger" style={{flex:1,padding:'10px 0'}} onClick={onCancel}>取消</button>
          <button className="btn btn-success" style={{flex:1,padding:'10px 0'}} onClick={onOk}>確定</button>
        </div>
      </div>
    </div>
  );
}

// ─── localStorage Hook ───────────────────────────────────────
function useLS(key, initial) {
  const [val, setVal] = React.useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  const set = React.useCallback(v => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      localStorage.setItem(key, JSON.stringify(next));
      return next;
    });
  }, [key]);
  return [val, set];
}

// ─── 輔助函式 ─────────────────────────────────────────────────
const isExpense = t => !t.type || t.type === 'expense';
const isIncome  = t => t.type === 'income';
function fmtAmt(amount) {
  return `NT$${Number(amount).toLocaleString('zh-TW',{minimumFractionDigits:0,maximumFractionDigits:0})}`;
}
function genId()    { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr() { return new Date().toISOString().slice(0,10); }

function getWeeklyData(txns) {
  const weeks = [[0,0],[0,0],[0,0],[0,0]];
  const now = new Date(), ms = new Date(now.getFullYear(), now.getMonth(), 1);
  txns.filter(t=>{ const d=new Date(t.date); return d>=ms&&d<=now; }).forEach(t=>{
    const w = Math.min(Math.floor((new Date(t.date).getDate()-1)/7),3);
    const v = t.amount;
    if (isExpense(t)) weeks[w][0] += v; else weeks[w][1] += v;
  });
  let cum = 0;
  return weeks.map((v,i)=>({ name:`W${i+1}`, expense:Math.round(v[0]), income:Math.round(v[1]), cumulative:Math.round(cum+=v[0]) }));
}
function getCatBreakdown(txns) {
  const map = {};
  txns.filter(isExpense).forEach(t=>{ const k=t.category||'other'; map[k]=(map[k]||0)+t.amount; });
  return Object.entries(map).map(([id,value])=>({ id, value:Math.round(value), ...(CAT_MAP[id]||CAT_MAP.other) })).sort((a,b)=>b.value-a.value);
}

// ─── 日期工具 ─────────────────────────────────────────────────
function getDateRange(preset) {
  const now = new Date(), y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
  if (preset==='today')  return [todayStr(), todayStr()];
  if (preset==='week')   { const mon = new Date(now); mon.setDate(d - ((now.getDay()||7)-1)); return [mon.toISOString().slice(0,10), todayStr()]; }
  if (preset==='month')  return [`${y}-${String(m+1).padStart(2,'0')}-01`, todayStr()];
  if (preset==='last')   { const lm = new Date(y, m, 0); return [`${lm.getFullYear()}-${String(lm.getMonth()+1).padStart(2,'0')}-01`, lm.toISOString().slice(0,10)]; }
  return [null, null];
}

// ─── 【修改 2】：強化版 API 呼叫，含 503 自動 fallback ──────────
const FALLBACK_MODEL = 'gemini-2.5-flash-lite';

async function callGeminiAPIWithModel(key, model, body, retries=3, delay=2000) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
  let lastStatus = 0;
  for (let i = 0; i <= retries; i++) {
    let res;
    try {
      res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    } catch (networkErr) {
      if (i === retries) return { ok:false, data:null, errorMsg:`網路錯誤：${networkErr.message}`, httpStatus:0, model };
      await new Promise(r => setTimeout(r, delay * Math.pow(2, i)));
      continue;
    }

    lastStatus = res.status;

    // 429 / 503 → 等更久再重試
    if ((res.status === 429 || res.status === 503) && i < retries) {
      await new Promise(r => setTimeout(r, delay * Math.pow(2, i)));
      continue;
    }

    let data = null;
    try { data = await res.json(); } catch {}

    if (!res.ok) {
      const apiMsg = data?.error?.message || data?.error?.status || null;
      return { ok:false, data, errorMsg: getErrorHint(res.status, apiMsg, key), httpStatus: res.status, model };
    }

    return { ok:true, data, errorMsg:'', httpStatus: res.status, model };
  }
  return { ok:false, data:null, errorMsg:`請求失敗，HTTP ${lastStatus}`, httpStatus: lastStatus, model };
}

// 主入口：先試主模型，503 自動切換備用模型
async function callGeminiAPI(key, body) {
  const primary = await callGeminiAPIWithModel(key, GEMINI_MODEL, body);
  if (!primary.ok && primary.httpStatus === 503) {
    const fallback = await callGeminiAPIWithModel(key, FALLBACK_MODEL, body);
    if (fallback.ok) return { ...fallback, usedFallback: true };
    return {
      ...fallback,
      errorMsg: `主模型（${GEMINI_MODEL}）與備用模型（${FALLBACK_MODEL}）均無法使用。\n` + fallback.errorMsg,
    };
  }
  return primary;
}

// ─── 【修改 3】：依錯誤碼給出中文提示 ──────────────────────────
function getErrorHint(status, apiMsg, key) {
  const keyPreview = key ? `（Key 前綴：${key.slice(0,8)}…）` : '';
  switch (status) {
    case 400: return `❌ 請求格式錯誤 (400)${keyPreview}\n${apiMsg || '可能是模型名稱不支援或請求體有問題。'}`;
    case 401: return `🔑 API Key 無效或未授權 (401)${keyPreview}\n請確認 Key 是否正確、是否已啟用 Gemini API。`;
    case 403: return `🚫 存取被拒絕 (403)${keyPreview}\nAPI Key 可能沒有 Gemini API 使用權限，或所在地區不支援。請至 Google AI Studio 確認。`;
    case 404: return `🔍 模型或端點不存在 (404)\n模型「${GEMINI_MODEL}」可能尚未對您的帳號開放預覽版存取，請確認 Google AI Studio 已啟用該模型。`;
    case 429: return `⏳ 超過 API 請求頻率限制 (429)\n請稍候幾分鐘再試，或確認您的帳號配額。`;
    case 500: return `🔥 Google 伺服器內部錯誤 (500)\n${apiMsg || '請稍後再試。'}`;
    case 503: return `🛠️ Google 服務暫時無法使用 (503)\n請稍後再試。`;
    default:  return `⚠️ 未知錯誤 (HTTP ${status})\n${apiMsg || '請檢查網路連線及 API Key 設定。'}`;
  }
}

// ─── Markdown 渲染 ───────────────────────────────────────────
function MarkdownText({ text }) {
  const ri = str => {
    const parts=[]; let last=0; const re=/(\*\*(.+?)\*\*)|(\*(.+?)\*)/g; let m;
    while((m=re.exec(str))!==null){
      if(m.index>last) parts.push(str.slice(last,m.index));
      if(m[1]) parts.push(<strong key={m.index}>{m[2]}</strong>);
      else parts.push(<em key={m.index}>{m[4]}</em>);
      last=m.index+m[0].length;
    }
    if(last<str.length) parts.push(str.slice(last));
    return parts;
  };
  const lines=text.split('\n'), els=[], lis=[];
  const fl=()=>{ if(lis.length){ els.push(<ul key={`ul${els.length}`}>{[...lis]}</ul>); lis.length=0; } };
  lines.forEach((l,i)=>{
    if(l.startsWith('### '))    { fl(); els.push(<h4 key={i}>{l.slice(4)}</h4>); }
    else if(l.startsWith('## ')){ fl(); els.push(<h3 key={i}>{l.slice(3)}</h3>); }
    else if(l.startsWith('# ')) { fl(); els.push(<h2 key={i}>{l.slice(2)}</h2>); }
    else if(l.startsWith('---')){ fl(); els.push(<hr key={i}/>); }
    else if(l.match(/^[-*]\s/)) { lis.push(<li key={i}>{ri(l.slice(2))}</li>); }
    else if(l.trim()==='')      { fl(); }
    else                        { fl(); els.push(<p key={i}>{ri(l)}</p>); }
  });
  fl();
  return <div className="md-content">{els}</div>;
}

// ─── 記帳頁 ──────────────────────────────────────────────────
function AddPage({ wallets, settings, setTxns, setWallets, setPage, editTxn, setEditTxn }) {
  const isEdit = !!editTxn;
  const initType = isEdit ? (editTxn.type||'expense') : 'expense';
  const [txnType, setTxnType] = React.useState(initType);
  const [mode,    setMode]    = React.useState('manual');
  const [amount,  setAmount]  = React.useState(isEdit ? String(editTxn.amount) : '');
  const [cat,     setCat]     = React.useState(isEdit ? editTxn.category : EXPENSE_CATS[0].id);
  const [walletId,setWId]     = React.useState(isEdit ? editTxn.walletId : (wallets[0]?.id||''));
  const [note,    setNote]    = React.useState(isEdit ? (editTxn.note||'') : '');
  const [date,    setDate]    = React.useState(isEdit ? editTxn.date : todayStr());
  const [aiText,  setAiText]  = React.useState('');
  const [parsing, setParsing] = React.useState(false);
  const [aiErr,   setAiErr]   = React.useState('');
  const [quickCat,setQuickCat]= React.useState(null);
  const [quickAmt,setQuickAmt]= React.useState('');
  const [quickNote,setQuickNote]=React.useState('');

  const activeCats = txnType==='income' ? INCOME_CATS : EXPENSE_CATS;
  const cancel = () => { setEditTxn && setEditTxn(null); setPage('home'); };

  const applyWalletDelta = (wid, amt, type, sign) => {
    const delta = type==='income' ? amt * sign : amt * -sign;
    setWallets(prev=>prev.map(w=>w.id===wid ? {...w, balance:w.balance+delta} : w));
  };

  const submit = () => {
    if (!amount || !walletId) return;
    const newAmt = parseFloat(amount);
    if (isEdit) {
      applyWalletDelta(editTxn.walletId, editTxn.amount, editTxn.type||'expense', -1);
      applyWalletDelta(walletId, newAmt, txnType, +1);
      setTxns(prev=>prev.map(t=>t.id===editTxn.id ? {...t,amount:newAmt,category:cat,walletId,note:note.trim(),date,type:txnType} : t));
      setEditTxn && setEditTxn(null);
    } else {
      const txn={id:genId(),amount:newAmt,category:cat,walletId,note:note.trim(),date,type:txnType};
      setTxns(prev=>[txn,...prev]);
      applyWalletDelta(walletId, newAmt, txnType, +1);
    }
    setPage('home');
  };

  const submitQuick = () => {
    if (!quickAmt || !quickCat || !walletId) return;
    const amt = parseFloat(quickAmt);
    const txn={id:genId(),amount:amt,category:quickCat,walletId,note:quickNote.trim(),date:todayStr(),type:txnType};
    setTxns(prev=>[txn,...prev]);
    applyWalletDelta(walletId, amt, txnType, +1);
    setPage('home');
  };

  // ── AI 解析（使用強化版 callGeminiAPI）──
  const parseAI = async () => {
    if (!aiText.trim()) return;
    const key = settings.geminiKey;
    if (!key) { setAiErr('請先在設定頁填入 Gemini API Key'); return; }
    setParsing(true); setAiErr('');
    try {
      const catIds = activeCats.map(c=>c.id).join('/');
      const result = await callGeminiAPI(key, {
        contents: [{ parts: [{ text: aiText }] }],
        systemInstruction: { parts: [{ text: `你是記帳助手。回傳純 JSON（不加 Markdown）：{"category":"id（${catIds}）","amount":數字,"note":"備註","date":"YYYY-MM-DD"}。今天：${todayStr()}。` }] }
      });

      if (!result.ok) {
        setAiErr(result.errorMsg);
        return;
      }

      const raw = result.data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('AI 回傳了非 JSON 格式，請重試。原始回應：' + raw.slice(0, 100));
      const p = JSON.parse(match[0]);
      if (p.amount)   setAmount(String(p.amount));
      if (p.category && CAT_MAP[p.category]) setCat(p.category);
      if (p.note)     setNote(p.note);
      if (p.date)     setDate(p.date);
      setMode('manual');
    } catch(e) {
      setAiErr('解析失敗：' + (e.message || '請重試'));
    } finally { setParsing(false); }
  };

  const formValid = amount && parseFloat(amount)>0 && walletId;

  return (
    <div className="page fade-in">
      <div style={{display:'flex',alignItems:'center',marginBottom:20}}>
        <button className="btn btn-ghost" style={{padding:'8px 12px',marginRight:12}} onClick={cancel}>←</button>
        <h2 style={{fontWeight:700,fontSize:20}}>{isEdit?'編輯交易':'記帳'}</h2>
      </div>

      {!isEdit && (
        <div className="type-toggle">

}

// ─── 設定頁 ──────────────────────────────────────────────────
function SettingsPage({ settings, setSettings }) {
  const [key,    setKey]    = React.useState(settings.geminiKey||'');
  const [budget, setBudget] = React.useState(String(settings.budget||30000));
  const [saved,  setSaved]  = React.useState(false);
  const [confirmReset,setConfirmReset] = React.useState(false);

  const save = () => {
    setSettings({...settings,geminiKey:key.trim(),budget:parseFloat(budget)||30000});
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  };
  const toggleTheme = () => {
    const newTheme = settings.theme === 'dark' ? 'light' : 'dark';
    setSettings({...settings, theme: newTheme});
    document.documentElement.setAttribute('data-theme', newTheme);
  };
  const exportData = () => {
    const data = { fw_transactions:JSON.parse(localStorage.getItem('fw_transactions')||'[]'), fw_wallets:JSON.parse(localStorage.getItem('fw_wallets')||'[]'), fw_subscriptions:JSON.parse(localStorage.getItem('fw_subscriptions')||'[]'), fw_settings:JSON.parse(localStorage.getItem('fw_settings')||'{}') };
    const url = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
    Object.assign(document.createElement('a'),{href:url,download:`family-wallet-${todayStr()}.json`}).click();
    URL.revokeObjectURL(url);
  };
  const importData = e => {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const data=JSON.parse(ev.target.result);
        ['fw_transactions','fw_wallets','fw_subscriptions','fw_settings'].forEach(k=>{ if(data[k]!==undefined) localStorage.setItem(k,JSON.stringify(data[k])); });
        window.location.reload();
      } catch { alert('匯入失敗：JSON 格式錯誤'); }
    };
    reader.readAsText(file);
  };
  const resetAll = () => { ['fw_transactions','fw_wallets','fw_subscriptions','fw_settings'].forEach(k=>localStorage.removeItem(k)); window.location.reload(); };

  return (
    <div className="page fade-in">
      <h2 style={{fontWeight:700,fontSize:20,marginBottom:24}}>⚙️ 設定</h2>

      <div className="section-title">外觀與一般設定</div>
      <div className="card" style={{padding:16,marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:600}}>🌓 主題切換 (深色 / 淺色)</div>
          <button className="btn btn-ghost" style={{padding:'8px 16px',fontSize:13}} onClick={toggleTheme}>
            切換為 {settings.theme === 'dark' ? '淺色模式' : '深色模式'}
          </button>
        </div>
        <div style={{height:'1px', background:'var(--card-border)', margin:'0 -16px 16px'}}></div>
        <label style={{fontSize:13,color:'var(--text-muted)',display:'block',marginBottom:6}}>每月預算</label>
        <input type="number" value={budget} onChange={e=>setBudget(e.target.value)} style={{marginBottom:12}} />
        <button className="btn btn-primary" style={{width:'100%'}} onClick={save}>{saved?'✅ 已儲存':'💾 儲存設定'}</button>
      </div>

      <div className="section-title">Gemini API Key</div>
      <div className="card" style={{padding:16,marginBottom:20}}>
        <input type="password" placeholder="AIza…" value={key} onChange={e=>setKey(e.target.value)} style={{marginBottom:12}} />
        {/* ── 顯示當前模型版本 ── */}
        <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
          <span>🤖</span><span>當前模型：{GEMINI_MODEL}</span>
        </div>
        <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:16}}>*請填入您的 API Key 以啟用 AI 財務顧問及 AI 記帳功能</div>
        <button className="btn btn-primary" style={{width:'100%'}} onClick={save}>{saved?'✅ 已儲存':'💾 儲存設定'}</button>
      </div>

      <div className="section-title">資料管理</div>
      <div className="card" style={{padding:16,marginBottom:20,display:'flex',flexDirection:'column',gap:10}}>
        <button className="btn btn-ghost" style={{width:'100%'}} onClick={exportData}>📤 匯出 JSON</button>
        <label className="btn btn-ghost" style={{width:'100%',cursor:'pointer'}}>📥 匯入 JSON <input type="file" accept=".json" style={{display:'none'}} onChange={importData} /></label>
      </div>

      <div className="section-title" style={{color:'var(--danger)'}}>危險區</div>
      <div className="card" style={{padding:16}}>
        <button className="btn btn-danger" style={{width:'100%'}} onClick={()=>setConfirmReset(true)}>🗑️ 重置所有資料</button>
      </div>

      <CustomModal
        isOpen={confirmReset}
        title="重置所有資料"
        text="確定要清除所有資料？此操作無法復原。"
        textRed={true}
        onOk={resetAll}
        onCancel={()=>setConfirmReset(false)}
      />
    </div>
  );
}

      <div className="card" style={{overflow:'hidden'}}>

          ))}
      </div>
    </div>
  );

// ─── 帳戶頁 ──────────────────────────────────────────────────
function WalletPage({ txns, wallets, setWallets }) {

  const handleDelConfirm = ()=>{ setWallets(prev=>prev.filter(w=>w.id!==delId)); if(expanded===delId) setExpanded(null); setDelId(null); };
  const wtxns=id=>txns.filter(t=>t.walletId===id).sort((a,b)=>b.date.localeCompare(a.date));

            <div style={{display:'flex',alignItems:'center',padding:'14px 16px',cursor:'pointer'}} onClick={()=>setExpanded(isOpen?null:w.id)}>
              <div style={{width:42,height:42,borderRadius:12,background:'rgba(177,172,179,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,marginRight:14}}>{w.icon}</div>
              <div style={{flex:1}}><div style={{fontWeight:600,fontSize:15}}>{w.name}</div><div style={{fontSize:12,color:'var(--text-dim)'}}>{wt.length} 筆交易</div></div>
              <div style={{textAlign:'right',marginRight:12}}><div style={{fontWeight:700,color:w.balance>=0?'var(--text)':'var(--danger)',fontSize:16}}>{fmtAmt(w.balance)}</div></div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-ghost" style={{padding:'6px 10px',fontSize:13}} onClick={e=>{e.stopPropagation();openEdit(w);}}>✏️</button>
                <button className="btn btn-danger" style={{padding:'6px 10px',fontSize:13}} onClick={e=>{e.stopPropagation();setDelId(w.id);}}>🗑️</button>
              </div>
            </div>
            {isOpen && <div style={{borderTop:'1px solid var(--card-border)'}}>
              {wt.length===0?<div style={{padding:16,color:'var(--text-dim)',fontSize:14}}>此錢包尚無交易</div>
                :wt.slice(0,10).map((t,i)=>{ const cat=CAT_MAP[t.category]||CAT_MAP.other; return (
                  <div key={t.id} style={{display:'flex',alignItems:'center',padding:'10px 16px',borderTop:i===0?'none':'1px solid var(--card-border)'}}>
                    <span style={{fontSize:18,marginRight:10}}>{cat.emoji}</span>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{cat.label}</div>{t.note&&<div style={{fontSize:11,color:'var(--text-dim)'}}>{t.note}</div>}</div>
                    <div style={{fontSize:12,color:'var(--text-dim)',marginRight:10}}>{t.date}</div>
                    <div style={{fontSize:14,fontWeight:600,color:isIncome(t)?'var(--accent)':'var(--danger)'}}>{isIncome(t)?'+':'-'}{fmtAmt(t.amount)}</div>
                  </div>
                );})}
            </div>}
          </div>
        );
      })}
      <CustomModal isOpen={!!delId} title="刪除錢包" text="確定要刪除這個錢包嗎？相關的交易記錄仍會保留。" onOk={handleDelConfirm} onCancel={()=>setDelId(null)} />
    </div>
  );
}

// ─── 訂閱管理頁 ──────────────────────────────────────────────
function SubsPage({ subs, setSubs }) {
  const [editing,setEditing]=React.useState(null);
  const [delId,setDelId]=React.useState(null);
  const [form,setForm]=React.useState({name:'',icon:'📱',amount:'',billingDay:'1',lastUsed:todayStr(),active:true});
  const openNew=()=>{setForm({name:'',icon:'📱',amount:'',billingDay:'1',lastUsed:todayStr(),active:true});setEditing('new');};
  const openEdit=s=>{setForm({...s,amount:String(s.amount),billingDay:String(s.billingDay)});setEditing(s.id);};
  const save=()=>{ const s={...form,amount:parseFloat(form.amount)||0,billingDay:parseInt(form.billingDay)||1}; if(editing==='new') setSubs(prev=>[...prev,{...s,id:genId()}]); else setSubs(prev=>prev.map(x=>x.id===editing?{...x,...s}:x)); setEditing(null); };
  const toggle=id=>setSubs(prev=>prev.map(s=>s.id===id?{...s,active:!s.active}:s));
  const daysUntil=bd=>{ const now=new Date(); let next=new Date(now.getFullYear(),now.getMonth(),bd); if(next<=now) next=new Date(now.getFullYear(),now.getMonth()+1,bd); return Math.ceil((next-now)/86400000); };
  const isZombie=s=>s.lastUsed&&Math.floor((Date.now()-new Date(s.lastUsed))/86400000)>60;
  const monthTotal=subs.filter(s=>s.active).reduce((s,x)=>s+x.amount,0);
  const yearWaste=subs.filter(s=>isZombie(s)&&s.active).reduce((sum,s)=>sum+s.amount*12,0);
  const ICONS=['📱','🎵','🎬','🎮','☁️','📚','🏋️','🛒','💼','🌐'];
  return (
    <div className="page fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h2 style={{fontWeight:700,fontSize:20}}>📋 訂閱管理</h2>
        {editing===null
          ? <button className="btn btn-primary" style={{padding:'10px 16px',fontSize:14}} onClick={openNew}>➕ 新增訂閱</button>
          : <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" style={{padding:'10px 16px',fontSize:14}} onClick={save}>💾 儲存</button>
              <button className="btn btn-ghost"   style={{padding:'10px 16px',fontSize:14}} onClick={()=>setEditing(null)}>✕ 取消</button>
            </div>
        }
      </div>
      <div className="info-banner" style={{marginBottom:16}}>
        <span style={{fontSize:20}}>🤖</span>
        <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>全自動扣款啟用中</div><div style={{fontSize:12,color:'var(--text-dim)',marginTop:2}}>系統會根據您設定的扣款日期，自動在當天為您新增一筆訂閱消費記錄，不需手動記帳。若從首頁刪除自動記帳，相關的訂閱也會同時被移除。</div></div>
      </div>
      {editing!==null&&(
        <div className="card fade-in" style={{padding:20,marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--text-muted)',marginBottom:14}}>{editing==='new'?'新增訂閱資訊':'編輯訂閱資訊'}</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div><label style={{fontSize:13,color:'var(--text-muted)',display:'block',marginBottom:6}}>名稱</label><input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="例：Netflix" /></div>
            <div><label style={{fontSize:13,color:'var(--text-muted)',display:'block',marginBottom:6}}>圖示</label><div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{ICONS.map(ic=><button key={ic} onClick={()=>setForm(p=>({...p,icon:ic}))} style={{width:44,height:44,borderRadius:10,fontSize:22,border:form.icon===ic?'2px solid var(--primary)':'2px solid transparent',background:form.icon===ic?'rgba(177,172,179,0.2)':'var(--input-bg)',cursor:'pointer'}}>{ic}</button>)}</div></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div><label style={{fontSize:13,color:'var(--text-muted)',display:'block',marginBottom:6}}>月費</label><input type="number" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))} placeholder="0" /></div>
              <div><label style={{fontSize:13,color:'var(--text-muted)',display:'block',marginBottom:6}}>扣款日（號）</label><input type="number" min="1" max="28" value={form.billingDay} onChange={e=>setForm(p=>({...p,billingDay:e.target.value}))} /></div>
            </div>
            <div><label style={{fontSize:13,color:'var(--text-muted)',display:'block',marginBottom:6}}>實際最後使用日（供殭屍訂閱偵測）</label><input type="date" value={form.lastUsed} onChange={e=>setForm(p=>({...p,lastUsed:e.target.value}))} /></div>
          </div>
        </div>
      )}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
        <div className="card" style={{padding:'14px 16px'}}><div style={{fontSize:12,color:'var(--text-muted)',marginBottom:4}}>本月訂閱支出</div><div style={{fontWeight:700,fontSize:20,color:'var(--text)'}}>{fmtAmt(monthTotal)}</div></div>
        <div className="card" style={{padding:'14px 16px'}}><div style={{fontSize:12,color:'var(--text-muted)',marginBottom:4}}>殭屍年度浪費</div><div style={{fontWeight:700,fontSize:20,color:yearWaste>0?'var(--danger)':'var(--text-dim)'}}>{fmtAmt(yearWaste)}</div></div>
      </div>
      {subs.length===0?<div style={{textAlign:'center',padding:'40px 0',color:'var(--text-dim)'}}><div style={{fontSize:40}}>📭</div><div style={{marginTop:8}}>尚無訂閱</div></div>
        :subs.map(s=>{ const zombie=isZombie(s); const dl=daysUntil(s.billingDay); return (
          <div key={s.id} className="card" style={{padding:'14px 16px',marginBottom:12,opacity:s.active?1:0.5,animation:zombie&&s.active?'pulseRed 2s infinite':'none',border:zombie&&s.active?'1px solid rgba(239,68,68,0.4)':'var(--card-border)'}}>
            <div style={{display:'flex',alignItems:'center'}}>
              <div style={{width:42,height:42,borderRadius:12,background:'rgba(177,172,179,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,marginRight:14,flexShrink:0}}>{s.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <span style={{fontWeight:600,fontSize:15}}>{s.name}</span>
                  {zombie&&s.active&&<span className="badge" style={{background:'rgba(239,68,68,0.15)',color:'var(--danger)',fontSize:10}}>🧟 殭屍</span>}
                  {!s.active&&<span className="badge" style={{background:'rgba(148,163,184,0.1)',color:'var(--text-dim)',fontSize:10}}>已取消</span>}
                </div>
                <div style={{fontSize:12,color:'var(--text-dim)',marginTop:2}}>{s.active?`${dl} 天後自動扣款`:'已暫停'} · {fmtAmt(s.amount)}/月</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-ghost" style={{padding:'6px 10px',fontSize:13}} onClick={()=>toggle(s.id)}>{s.active?'⏸':'▶️'}</button>
                <button className="btn btn-ghost" style={{padding:'6px 10px',fontSize:13}} onClick={()=>openEdit(s)}>✏️</button>
                <button className="btn btn-danger" style={{padding:'6px 10px',fontSize:13}} onClick={()=>setDelId(s.id)}>🗑️</button>
              </div>
            </div>
          </div>
        );})}
      <CustomModal isOpen={!!delId} title="刪除訂閱" text="確定要刪除這個訂閱嗎？未來的扣款將不再自動產生。" onOk={()=>{setSubs(p=>p.filter(s=>s.id!==delId)); setDelId(null);}} onCancel={()=>setDelId(null)} />
    </div>
  );
}

// ─── AI 深度對話頁 ────────────────────────────────────────────
function AIPage({ txns, settings }) {
  const [history, setHistory] = useLS('fw_chat', []);
  const [input,   setInput]   = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [clearConfirm, setClearConfirm] = React.useState(false);
  const [activeModel, setActiveModel] = React.useState(GEMINI_MODEL);
  const [usingFallback, setUsingFallback] = React.useState(false);
  const bottomRef = React.useRef(null);

  React.useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); }, [history, loading]);

  const QUICK_PROMPTS = ['這個月花最多的分類是什麼？','幫我找出超過 500 元的消費','比較這週和上週的支出','給我三個具體省錢建議'];

  const buildContext = () => {
    const recent = txns.slice(0,30).map(t=>({ date:t.date, type:isIncome(t)?'收入':'支出', category:CAT_MAP[t.category]?.label||t.category, amount:t.amount, note:t.note||'' }));
    return `你是一位理財顧問助理。使用者的近期交易數據（最多 30 筆，幣別皆為 TWD）如下：\n${JSON.stringify(recent,null,2)}\n\n請用繁體中文回答，可以使用 Markdown 格式排版。回答要具體、簡潔、有洞察力。`;
  };

  const sendMessage = async (text) => {
    const msg = text || input.trim();
    if (!msg) return;
    const key = settings.geminiKey;

    // ── 沒有 Key：直接給出診斷訊息 ──
    if (!key) {
      setHistory(prev=>[...prev,
        {role:'user',content:msg,ts:Date.now()},
        {role:'error',errorMsg:'🔑 尚未設定 API Key\n請前往「⚙️ 設定」頁面填入您的 Gemini API Key，儲存後再回來使用。',httpStatus:0,rawData:null,ts:Date.now()}
      ]);
      setInput('');
      return;
    }

    const userMsg = {role:'user',content:msg,ts:Date.now()};
    const newHistory = [...history, userMsg];
    setHistory(newHistory);
    setInput('');
    setLoading(true);

    try {
      const contents = newHistory.map(m=>({
        role: m.role==='user' ? 'user' : 'model',
        parts: [{ text: m.content || '' }]
      })).filter(m => m.parts[0].text); // 過濾掉 error 訊息，不送給 API

      const result = await callGeminiAPI(key, {
        systemInstruction: { parts: [{ text: buildContext() }] },
        contents,
      });

      if (!result.ok) {
        setHistory(prev=>[...prev, buildErrorChatMsg(result)]);
        return;
      }

      const reply = result.data?.candidates?.[0]?.content?.parts?.[0]?.text || '抱歉，沒有收到回應';
      if (result.usedFallback) { setActiveModel(FALLBACK_MODEL); setUsingFallback(true); }
      else { setActiveModel(GEMINI_MODEL); setUsingFallback(false); }
      setHistory(prev=>[...prev,{role:'assistant',content:reply,ts:Date.now()}]);
    } catch(e) {
      setHistory(prev=>[...prev,{
        role:'error',
        errorMsg:`⚠️ 發生例外錯誤\n${e.message || '請重試'}`,
        httpStatus: 0,
        rawData: null,
        ts: Date.now(),
      }]);
    } finally { setLoading(false); }
  };

  const fmtTime = ts => new Date(ts).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:'var(--bg)',maxWidth:430,margin:'0 auto'}}>
      <div style={{padding:'16px 16px 12px',borderBottom:'var(--card-border)',background:'var(--nav-bg)',backdropFilter:'blur(20px)',flexShrink:0,transition:'background-color 0.4s'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontWeight:700,fontSize:18}}>💡 AI 財務顧問</div>
            <div style={{fontSize:11,color:'var(--text-dim)',display:'flex',alignItems:'center',gap:4}}>
              <span>{activeModel}</span>
              {usingFallback && <span style={{background:'rgba(245,158,11,0.15)',color:'var(--warning)',borderRadius:6,padding:'1px 6px',fontSize:10,fontWeight:600}}>備用中</span>}
              <span>· {txns.length} 筆數據</span>
            </div>
          </div>
          <button className="btn btn-ghost" style={{padding:'6px 12px',fontSize:12}} onClick={()=>setClearConfirm(true)}>清除</button>
        </div>
        {history.length===0 && (
          <div className="filter-chips" style={{marginTop:10}}>
            {QUICK_PROMPTS.map(q=><button key={q} className="chip" onClick={()=>sendMessage(q)} style={{fontSize:12}}>{q}</button>)}
          </div>
        )}
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column',gap:12}}>
        {history.length===0 && (
          <div style={{textAlign:'center',marginTop:40,color:'var(--text-dim)'}}>
            <div style={{fontSize:48}}>🤖</div>
            <div style={{marginTop:12,fontWeight:600,color:'var(--text-muted)'}}>你好！我是你的 AI 財務顧問</div>
            <div style={{marginTop:6,fontSize:13}}>你可以問我任何關於你的消費習慣、預算分析或省錢建議</div>
          </div>
        )}
        {history.map((m,i)=>(
          <div key={i} style={{display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start'}}>
            {m.role==='user'
              ? <div className="chat-bubble-user">{m.content}</div>
              : m.role==='error'
                ? <ErrorBubble msg={m} />
                : <div className="chat-bubble-ai"><MarkdownText text={m.content} /></div>}
            <div className="chat-ts" style={{textAlign:m.role==='user'?'right':'left'}}>{fmtTime(m.ts)}</div>
          </div>
        ))}
        {loading && (
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-start'}}>
            <div className="chat-bubble-ai" style={{display:'flex',gap:6,padding:'14px 16px'}}>
              {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:'var(--text-dim)',animation:`bounce 1s ${i*0.2}s ease-in-out infinite`}} />)}
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      <div style={{padding:'12px 16px',paddingBottom:'calc(var(--nav-h) + 12px)',borderTop:'var(--card-border)',background:'var(--nav-bg)',backdropFilter:'blur(20px)',flexShrink:0,transition:'background-color 0.4s'}}>
        <div style={{display:'flex',gap:10,alignItems:'flex-end'}}>
          <textarea
            rows={1} value={input}
            onChange={e=>{ setInput(e.target.value); e.target.style.height='auto'; e.target.style.height=Math.min(e.target.scrollHeight,120)+'px'; }}
            onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }}
            placeholder="輸入問題… (Enter 送出)"
            style={{flex:1,resize:'none',minHeight:44,maxHeight:120,overflowY:'auto',lineHeight:1.5,padding:'11px 14px'}}
            disabled={loading}
          />
          <button className="btn btn-primary" style={{padding:'11px 16px',flexShrink:0,height:44}} onClick={()=>sendMessage()} disabled={loading||!input.trim()}>
            {loading?<div className="spinner"/>:'送出'}
          </button>
        </div>
      </div>

      <CustomModal
        isOpen={clearConfirm}
        title="清除對話"
        text="確定要清除所有的 AI 對話記錄嗎？"
        onOk={()=>{setHistory([]); setClearConfirm(false);}}
        onCancel={()=>setClearConfirm(false)}
      />
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────
function App() {
  const [page,    setPage]    = React.useState('home');
  const [txns,    setTxns]    = useLS('fw_transactions',  []);
  const [wallets, setWallets] = useLS('fw_wallets',       DEFAULT_WALLETS);
  const [subs,    setSubs]    = useLS('fw_subscriptions', []);
  const [settings,setSettings]= useLS('fw_settings',      DEFAULT_SETTINGS);
  const [editTxn, setEditTxn] = React.useState(null);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', settings.theme || 'light');
  }, [settings.theme]);

  React.useEffect(() => {
    if (!wallets.length || !subs.length) return;
    let hasChanges = false;
    const now = new Date();
    const currentYearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    const today = now.getDate();
    const newSubs = subs.map(s => {
      if (!s.active) return s;
      if (s.lastBilledMonth !== currentYearMonth && today >= parseInt(s.billingDay)) {
        hasChanges = true;
        return { ...s, _needsBilling: true };
      }
      return s;
    });
    if (hasChanges) {
      let updatedTxns = [...txns];
      let updatedWallets = [...wallets];
      const finalSubs = newSubs.map(s => {
        if (s._needsBilling) {
          const wId = updatedWallets[0]?.id;
          if (wId) {
            const amt = parseFloat(s.amount) || 0;
            updatedTxns.unshift({ id:genId(), amount:amt, category:'other', walletId:wId, note:`訂閱扣款：${s.name}`, date:todayStr(), type:'expense', subId:s.id });
            updatedWallets[0].balance -= amt;
          }
          delete s._needsBilling;
          s.lastBilledMonth = currentYearMonth;
        }
        return s;
      });
      setTxns(updatedTxns);
      setWallets(updatedWallets);
      setSubs(finalSubs);
    }
  }, [subs, txns, wallets, setTxns, setWallets, setSubs]);

  const pages = {
    home:     <HomePage     txns={txns} setTxns={setTxns} wallets={wallets} setWallets={setWallets} subs={subs} setSubs={setSubs} settings={settings} setPage={setPage} setEditTxn={setEditTxn} />,
    stats:    <StatsPage    txns={txns} />,
    wallets:  <WalletPage   txns={txns} wallets={wallets} setWallets={setWallets} />,
    add:      <AddPage      wallets={wallets} settings={settings} setTxns={setTxns} setWallets={setWallets} setPage={setPage} editTxn={editTxn} setEditTxn={setEditTxn} />,
    subs:     <SubsPage     subs={subs} setSubs={setSubs} />,
    ai:       <AIPage       txns={txns} settings={settings} />,
    settings: <SettingsPage settings={settings} setSettings={setSettings} />,
  };

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {pages[page] || pages.home}
      <BottomNav page={page} setPage={setPage} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
